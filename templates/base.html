<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Booknook{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block styles %}{% endblock %}
</head>
<body class="font-sans bg-gradient-to-r from-blue-50 to-gray-100 flex flex-col h-full">
    <nav class="bg-white bg-opacity-90 backdrop-filter backdrop-blur-lg shadow-lg">
        <div class="max-w-7xl mx-auto px-5 py-3">
            <div class="flex justify-between items-center">
                <a href="{{ url_for('index') }}" class="text-3xl font-bold text-blue-500 hover:text-blue-600 transition duration-300">
                    Booknook
                </a>
                {% if current_user.is_authenticated %}
                    <div class="flex items-center space-x-4">
                        <span class="text-lg text-gray-700">Hello, {{ current_user.username }}</span>
                        <a href="{{ url_for('logout') }}" class="text-md text-blue-500 hover:text-blue-600 transition duration-300">Logout</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="flex-grow">
        <div class="py-8">
            <div class="max-w-7xl mx-auto sm:px-6 lg:px-8">
                {% block content %}
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800">Welcome to Booknook!</h2>
                    <p class="text-gray-600 mt-2">Your one-stop destination for exploring and managing your book collection.</p>
                </div>
                {% endblock %}
            </div>
        </div>
    </div>
    <footer class="bg-white bg-opacity-90 backdrop-filter backdrop-blur-lg shadow-lg mt-8">
        <div class="max-w-7xl mx-auto py-4 px-5 text-center text-gray-600">
            <p>Tryout &copy; 2023</p>
        </div>
    </footer>
</body>
</html>
